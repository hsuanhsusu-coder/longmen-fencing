<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>龍門擊劍：真實反應競技版</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root { --dragon-red: #e63946; --champion-blue: #457b9d; --gold: #ffb703; --dark-bg: #0a0a0c; }
    
    body {
      margin: 0; padding: 0; background-color: #000; color: #fff;
      font-family: 'Noto Sans TC', sans-serif; height: 100vh; overflow: hidden;
      touch-action: none; -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent;
    }

    #portrait-warning {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 9999; flex-direction: column; 
      justify-content: center; align-items: center; text-align: center; font-size: 24px;
    }
    @media screen and (orientation: portrait) {
      #portrait-warning { display: flex; }
      #app-container { display: none !important; }
    }

    @keyframes shake {
      0%, 100% { transform: translate(0,0); }
      25% { transform: translate(-4px, 4px); }
      50% { transform: translate(4px, -4px); }
      75% { transform: translate(-4px, -4px); }
    }
    .shake-effect { animation: shake 0.2s ease-in-out both; }

    #app-container { width: 100%; height: 100%; position: relative; }

    #start-menu {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, #1a1a1d 0%, #000 100%);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 100;
    }
    .title-main { font-size: 56px; font-weight: 900; margin: 0; color: #fff; text-shadow: 0 0 20px var(--dragon-red); letter-spacing: 5px; text-align: center; }
    .title-sub { font-size: 18px; color: #888; margin-bottom: 40px; letter-spacing: 2px; text-align: center;}
    
    .mode-btn {
      background: #111; color: #fff; border: 2px solid #444; padding: 15px 40px;
      font-size: 20px; font-weight: bold; border-radius: 30px; margin: 10px;
      cursor: pointer; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }
    .mode-btn:active { transform: scale(0.95); }
    #btn-single { border-color: var(--dragon-red); }
    #btn-pvp { border-color: var(--champion-blue); }

    #game-wrapper {
      display: none; flex-direction: column; width: 100%; height: 100%;
      background: radial-gradient(circle at center, #111 0%, #000 100%);
    }

    #top-bar {
      display: flex; justify-content: space-between; align-items: center;
      height: 12%; background: #050505; border-bottom: 2px solid #222; z-index: 10; padding: 0 5%;
    }
    .score-block { display: flex; align-items: baseline; gap: 10px; }
    .score-name { font-size: 14px; color: #888; font-weight: bold; }
    .score-num { font-family: 'Orbitron'; font-size: 32px; font-weight: 900; }

    #arena { display: flex; flex-grow: 1; position: relative; }
    .side { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px; transition: 0.3s; position: relative; }
    #p1-side { border-right: 2px dashed #333; background: linear-gradient(90deg, rgba(230,57,70,0.05) 0%, transparent 100%); }
    #p2-side { background: linear-gradient(270deg, rgba(69,123,157,0.05) 0%, transparent 100%); }

    #center-console {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 45%; text-align: center; z-index: 20; pointer-events: none;
    }
    #log-text { font-size: 16px; background: rgba(0,0,0,0.85); padding: 10px; border-radius: 8px; border: 1px solid #444; }
    .highlight { color: var(--gold); font-size: 26px; font-weight: 900; margin-top: 5px; text-shadow: 0 0 10px var(--gold); }
    .allez-text { font-size: 36px; color: var(--gold); font-weight: 900; text-transform: uppercase; letter-spacing: 5px; animation: pop 0.2s ease-out; }
    @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    #sys-controls { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 30; pointer-events: auto; }
    .sys-btn { padding: 12px 25px; font-size: 18px; font-weight: 900; cursor: pointer; border-radius: 30px; border: none; background: #333; color: white; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    .sys-btn:active { transform: scale(0.9); }
    #start-round-btn { background: var(--gold); color: black; }

    .action-btn {
      width: 130px; height: 130px; border-radius: 50%; border: 4px solid #444;
      background: linear-gradient(145deg, #2a2a2a, #111); color: #fff;
      font-size: 24px; font-weight: 900; display: none;
      justify-content: center; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.8);
      pointer-events: auto;
    }
    .action-btn:active { transform: scale(0.92); background: #333; }
    
    .tactics-panel { display: none; flex-direction: column; gap: 15px; width: 85%; max-width: 200px; pointer-events: auto; }
    .tactic-btn {
      padding: 15px; border-radius: 10px; border: 2px solid #555; background: #1a1b26;
      color: #fff; font-size: 18px; font-weight: bold; text-align: center; cursor: pointer;
    }
    .tactic-btn:active { transform: scale(0.95); border-color: var(--gold); }
    .locked { background: var(--gold) !important; color: #000 !important; pointer-events: none; }
    
    #ai-status { color: #888; font-size: 22px; font-weight: bold; display: none; letter-spacing: 2px; }
  </style>
</head>
<body>

  <div id="portrait-warning">
    <div style="font-size:40px;">🔄</div>
    <div style="margin-top:10px;">請將手機轉為橫向</div>
    <div style="font-size: 16px; color:#888; margin-top:10px;">為獲得最佳遊戲體驗</div>
  </div>

  <div id="app-container">
    <div id="start-menu">
      <h1 class="title-main">龍門擊劍</h1>
      <div class="title-sub">真實反應競技版</div>
      <button class="mode-btn" id="btn-single">👤 單人挑戰 (AI)</button>
      <button class="mode-btn" id="btn-pvp">👥 雙人對戰 (同機競技)</button>
    </div>

    <div id="game-wrapper">
      <div id="top-bar">
        <div class="score-block">
          <span class="score-name" style="color:var(--dragon-red)">P1 紅方</span>
          <span class="score-num" id="score-p1" style="color:var(--dragon-red)">0</span>
        </div>
        <div style="font-family: 'Orbitron'; font-size: 12px; color: #666;">RACE TO 5</div>
        <div class="score-block">
          <span class="score-num" id="score-p2" style="color:var(--champion-blue)">0</span>
          <span class="score-name" id="name-p2" style="color:var(--champion-blue)">P2 藍方</span>
        </div>
      </div>

      <div id="arena">
        <div id="center-console">
          <div id="log-text" style="display:none;"></div>
          <div id="result-msg" class="highlight"></div>
        </div>

        <div id="sys-controls">
          <button class="sys-btn" id="back-menu-btn">返回首頁</button>
          <button class="sys-btn" id="start-round-btn">奪取攻擊權</button>
        </div>

        <div class="side" id="p1-side">
          <div class="action-btn" id="p1-action-btn">出劍</div>
          <div class="tactics-panel" id="p1-tactics">
            <div style="color:#888; text-align:center; font-size:14px; margin-bottom:5px;">你的戰術</div>
            <div class="tactic-btn" id="p1-t1">🗡️ 直劈頭</div>
            <div class="tactic-btn" id="p1-t2">💥 敲劍</div>
            <div class="tactic-btn" id="p1-t3">🎭 假動作</div>
          </div>
        </div>

        <div class="side" id="p2-side">
          <div class="action-btn" id="p2-action-btn">出劍</div>
          <div id="ai-status">AI 就緒</div>
          <div class="tactics-panel" id="p2-tactics">
            <div style="color:#888; text-align:center; font-size:14px; margin-bottom:5px;">對手戰術</div>
            <div class="tactic-btn" id="p2-t1">🛡️ 撥擋</div>
            <div class="tactic-btn" id="p2-t2">💨 滑步</div>
            <div class="tactic-btn" id="p2-t3">⚔️ 擊劍線</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

    const sfx = {
      score: () => {
        if(!audioCtx) return; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'square';
        osc.frequency.setValueAtTime(600, audioCtx.currentTime); osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.1); 
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
      },
      clash: () => {
        if(!audioCtx) return; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'triangle';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.4, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
      }
    };

    let currentMode = 'SINGLE';
    let gameState = 'WAITING'; // WAITING_ALLEZ -> TIMING -> TACTICS -> RESOLVING -> GAMEOVER
    let p1Score = 0, p2Score = 0;
    let allezStartTime = 0;
    let p1Reaction = null, p2Reaction = null;
    let p1Role = '', p2Role = '';
    let p1Choice = null, p2Choice = null;
    
    let allezTimeout = null;
    let aiTimeout = null;
    let phaseTimeout = null;

    const gc = document.getElementById('game-wrapper');
    const startMenu = document.getElementById('start-menu');
    const nameP2 = document.getElementById('name-p2');
    const logText = document.getElementById('log-text');
    const resultMsg = document.getElementById('result-msg');
    
    function triggerShake() { gc.classList.remove('shake-effect'); void gc.offsetWidth; gc.classList.add('shake-effect'); }
    function clearTimers() { 
      if(allezTimeout) clearTimeout(allezTimeout); 
      if(aiTimeout) clearTimeout(aiTimeout); 
      if(phaseTimeout) clearTimeout(phaseTimeout); 
    }

    // UI 切換綁定
    document.getElementById('btn-single').addEventListener('pointerdown', (e) => {
      e.preventDefault(); initAudio(); currentMode = 'SINGLE';
      startMenu.style.display = 'none'; gc.style.display = 'flex';
      nameP2.innerText = "AI 衛冕軍"; resetScores();
    });

    document.getElementById('btn-pvp').addEventListener('pointerdown', (e) => {
      e.preventDefault(); initAudio(); currentMode = 'PVP';
      startMenu.style.display = 'none'; gc.style.display = 'flex';
      nameP2.innerText = "P2 藍方"; resetScores();
    });

    document.getElementById('back-menu-btn').addEventListener('pointerdown', (e) => {
      e.preventDefault(); clearTimers(); gameState = 'WAITING';
      gc.style.display = 'none'; startMenu.style.display = 'flex';
    });

    document.getElementById('start-round-btn').addEventListener('pointerdown', (e) => {
      e.preventDefault(); startRound();
    });

    // 觸控出劍
    document.getElementById('p1-action-btn').addEventListener('pointerdown', (e) => {
      e.preventDefault();
      if (gameState === 'WAITING_ALLEZ' || gameState === 'TIMING') {
        if (p1Reaction === null) recordReaction('P1');
      }
    });

    document.getElementById('p2-action-btn').addEventListener('pointerdown', (e) => {
      e.preventDefault();
      if (currentMode === 'PVP' && (gameState === 'WAITING_ALLEZ' || gameState === 'TIMING')) {
        if (p2Reaction === null) recordReaction('P2');
      }
    });

    function resetScores() {
      p1Score = 0; p2Score = 0;
      document.getElementById('score-p1').innerText = "0";
      document.getElementById('score-p2').innerText = "0";
      resetRoundUI();
    }

    function resetRoundUI() {
      if (gameState === 'GAMEOVER') return;
      gameState = 'WAITING';
      document.getElementById('p1-tactics').style.display = 'none';
      document.getElementById('p2-tactics').style.display = 'none';
      document.getElementById('ai-status').style.display = 'none';
      document.getElementById('p1-action-btn').style.display = 'none';
      document.getElementById('p2-action-btn').style.display = 'none';
      
      logText.style.display = 'none'; resultMsg.innerHTML = "";
      document.getElementById('start-round-btn').innerText = "奪取攻擊權";
      document.getElementById('start-round-btn').style.display = 'block';
      document.getElementById('back-menu-btn').style.display = 'block';
    }

    function startRound() {
      initAudio(); clearTimers();
      gameState = 'WAITING_ALLEZ';
      p1Reaction = null; p2Reaction = null; p1Choice = null; p2Choice = null;
      
      document.getElementById('start-round-btn').style.display = 'none';
      document.getElementById('back-menu-btn').style.display = 'none';
      document.getElementById('p1-tactics').style.display = 'none';
      document.getElementById('p2-tactics').style.display = 'none';
      
      let btn1 = document.getElementById('p1-action-btn');
      btn1.style.display = 'flex'; btn1.style.background = ""; btn1.innerText = "出劍";
      
      if (currentMode === 'PVP') {
        let btn2 = document.getElementById('p2-action-btn');
        btn2.style.display = 'flex'; btn2.style.background = ""; btn2.innerText = "出劍";
        document.getElementById('ai-status').style.display = 'none';
      } else {
        document.getElementById('p2-action-btn').style.display = 'none';
        document.getElementById('ai-status').style.display = 'block';
        document.getElementById('ai-status').innerText = "AI 待機中...";
      }
      
      logText.style.display = 'block'; resultMsg.innerHTML = "";
      logText.innerHTML = "En Garde... <br><span style='font-size:14px; color:#888;'>（等待 Allez 出現後立刻按出劍！）</span>";
      
      // 隨機等待 2 秒 到 5 秒
      let randomDelay = 2000 + Math.random() * 3000;
      allezTimeout = setTimeout(triggerAllez, randomDelay);
    }

    function triggerAllez() {
      if (gameState !== 'WAITING_ALLEZ') return; // 防呆
      gameState = 'TIMING';
      allezStartTime = performance.now();
      
      logText.innerHTML = "<div class='allez-text'>Allez!</div>";

      if (currentMode === 'SINGLE') {
        // AI 正常反應時間約在 0.20s 到 0.45s 之間
        let aiReactionTime = 200 + Math.random() * 250; 
        aiTimeout = setTimeout(() => {
          if (gameState === 'TIMING' && p2Reaction === null) recordReaction('AI');
        }, aiReactionTime);
      }

      // 如果 2 秒內都沒人按，強制結算
      phaseTimeout = setTimeout(() => { if (gameState === 'TIMING') checkReactionPhase(true); }, 2000);
    }

    function recordReaction(player) {
      // 1. 如果在 Allez 前就按了 -> 搶拍犯規！
      if (gameState === 'WAITING_ALLEZ') {
        gameState = 'RESOLVING'; clearTimers();
        document.getElementById('p1-action-btn').style.display = 'none';
        document.getElementById('p2-action-btn').style.display = 'none';
        
        let p2Label = currentMode === 'SINGLE' ? 'AI' : 'P2';
        
        if (player === 'P1') {
          logText.innerHTML = "尚未喊出 Allez！<br><span style='color:red'>P1 搶拍犯規！</span>"; 
          resultMsg.innerHTML = `🏆 ${p2Label} 直接得分！`;
          triggerShake(); sfx.score(); addScore('P2');
        } else {
          logText.innerHTML = `尚未喊出 Allez！<br><span style='color:red'>${p2Label} 搶拍犯規！</span>`; 
          resultMsg.innerHTML = "🏆 P1 直接得分！";
          triggerShake(); sfx.score(); addScore('P1');
        }
        return;
      }

      // 2. 正常反應記錄
      if (gameState !== 'TIMING') return;
      let rTime = (performance.now() - allezStartTime) / 1000;

      if (player === 'P1') {
        p1Reaction = rTime;
        document.getElementById('p1-action-btn').style.background = "var(--dragon-red)";
        document.getElementById('p1-action-btn').innerText = "已出劍";
      } else { 
        p2Reaction = rTime;
        if(currentMode === 'PVP') {
          document.getElementById('p2-action-btn').style.background = "var(--champion-blue)";
          document.getElementById('p2-action-btn').innerText = "已出劍";
        } else {
          document.getElementById('ai-status').innerText = "AI 已出劍";
        }
      }

      // 雙方都按了再結算
      if (p1Reaction !== null && p2Reaction !== null) checkReactionPhase(false);
    }

    function checkReactionPhase(forceTimeout) {
      if (!forceTimeout && (p1Reaction === null || p2Reaction === null)) return;
      
      gameState = 'RESOLVING'; clearTimers();
      document.getElementById('p1-action-btn').style.display = 'none';
      document.getElementById('p2-action-btn').style.display = 'none';

      if (p1Reaction === null) p1Reaction = 9.99; if (p2Reaction === null) p2Reaction = 9.99;

      let p2Label = currentMode === 'SINGLE' ? 'AI' : 'P2';
      let timeMsg = `<span style='font-family:Orbitron;font-size:14px'>P1: ${p1Reaction.toFixed(3)}s | ${p2Label}: ${p2Reaction.toFixed(3)}s</span><br>`;

      // 判斷人類極限 (低於 0.15s) 且比對方快
      if (p1Reaction < 0.15 && p1Reaction < p2Reaction) {
        logText.innerHTML = timeMsg + "突破人類極限的爆發力！"; resultMsg.innerHTML = "🏆 P1 直接得分！";
        triggerShake(); sfx.score(); addScore('P1');
        return;
      }
      if (p2Reaction < 0.15 && p2Reaction < p1Reaction) {
        logText.innerHTML = timeMsg + "對手宛如閃電般出擊！"; resultMsg.innerHTML = `🏆 ${p2Label} 直接得分！`;
        triggerShake(); sfx.score(); addScore('P2');
        return;
      }

      // 正常路權判定 (誰反應快誰拿攻擊權)
      if (p1Reaction < p2Reaction) { 
        setupTactics('P1'); logText.innerHTML = timeMsg + "<span style='color:var(--dragon-red)'>P1 取得攻擊權！</span>"; 
      } else if (p2Reaction < p1Reaction) { 
        setupTactics('P2'); logText.innerHTML = timeMsg + `<span style='color:var(--champion-blue)'>${p2Label} 取得攻擊權！</span>`; 
      } else { 
        logText.innerHTML = timeMsg + "雙方完全同時擊中！"; resultMsg.innerHTML = "❌ 平手重置"; sfx.clash(); setTimeout(resetRoundUI, 2500); 
      }
    }

    // ==========================================
    // 戰術面板與觸控綁定
    // ==========================================
    function setupTactics(attacker) {
      gameState = 'TACTICS';
      document.getElementById('p1-tactics').style.display = 'flex';
      
      for(let i=1; i<=3; i++) {
        document.getElementById(`p1-t${i}`).classList.remove('locked');
        document.getElementById(`p1-t${i}`).innerText = "";
        document.getElementById(`p2-t${i}`).classList.remove('locked');
        document.getElementById(`p2-t${i}`).innerText = "";
      }

      if (currentMode === 'PVP') {
        document.getElementById('p2-tactics').style.display = 'flex';
      } else {
        document.getElementById('p2-tactics').style.display = 'none';
        document.getElementById('ai-status').style.display = 'block';
        document.getElementById('ai-status').innerText = "AI 思考中...";
      }

      if (attacker === 'P1') {
        p1Role = 'ATTACK'; p2Role = 'DEFEND';
        document.getElementById('p1-t1').innerText = "🗡️ 直劈頭"; document.getElementById('p1-t2').innerText = "💥 敲劍"; document.getElementById('p1-t3').innerText = "🎭 假動作";
        document.getElementById('p2-t1').innerText = "🛡️ 撥擋"; document.getElementById('p2-t2').innerText = "💨 滑步"; document.getElementById('p2-t3').innerText = "⚔️ 擊劍線";
      } else {
        p1Role = 'DEFEND'; p2Role = 'ATTACK';
        document.getElementById('p1-t1').innerText = "🛡️ 撥擋"; document.getElementById('p1-t2').innerText = "💨 滑步"; document.getElementById('p1-t3').innerText = "⚔️ 擊劍線";
        document.getElementById('p2-t1').innerText = "🗡️ 直劈頭"; document.getElementById('p2-t2').innerText = "💥 敲劍"; document.getElementById('p2-t3').innerText = "🎭 假動作";
      }
    }

    function bindTactic(btnId, player, moveStr) {
      document.getElementById(btnId).addEventListener('pointerdown', (e) => {
        e.preventDefault();
        if (gameState !== 'TACTICS') return;
        let el = e.target;
        if (player === 'P1' && !p1Choice) {
          p1Choice = moveStr; el.innerText = "✅ 已鎖定"; el.classList.add('locked');
          if (currentMode === 'SINGLE') { 
            p2Choice = ['MOVE1', 'MOVE2', 'MOVE3'][Math.floor(Math.random()*3)]; 
            document.getElementById('ai-status').innerText = "AI 已鎖定"; 
          }
        } else if (player === 'P2' && !p2Choice && currentMode === 'PVP') {
          p2Choice = moveStr; el.innerText = "✅ 已鎖定"; el.classList.add('locked');
        }
        if (p1Choice && p2Choice) resolveClashResult();
      });
    }

    bindTactic('p1-t1', 'P1', 'MOVE1'); bindTactic('p1-t2', 'P1', 'MOVE2'); bindTactic('p1-t3', 'P1', 'MOVE3');
    bindTactic('p2-t1', 'P2', 'MOVE1'); bindTactic('p2-t2', 'P2', 'MOVE2'); bindTactic('p2-t3', 'P2', 'MOVE3');

    function resolveClashResult() {
      gameState = 'RESOLVING'; logText.innerHTML = "⚔️ 瞬間交鋒中...";
      setTimeout(() => {
        let attMove = p1Role === 'ATTACK' ? p1Choice : p2Choice;
        let defMove = p1Role === 'DEFEND' ? p1Choice : p2Choice;
        
        let result = 'TIE';
        if (attMove === 'MOVE1') result = defMove === 'MOVE2' ? 'ATT_WIN' : 'DEF_WIN';
        if (attMove === 'MOVE2') result = (defMove === 'MOVE1' || defMove === 'MOVE3') ? 'ATT_WIN' : 'TIE';
        if (attMove === 'MOVE3') result = defMove === 'MOVE1' ? 'ATT_WIN' : 'DEF_WIN';
        
        let p1Name = getMoveName(p1Role, p1Choice); let p2Name = getMoveName(p2Role, p2Choice);
        let p2Label = currentMode === 'SINGLE' ? 'AI' : 'P2';
        
        logText.innerHTML = `P1 [${p1Name}] VS ${p2Label} [${p2Name}]`;

        if (result === 'ATT_WIN') {
          let winner = p1Role === 'ATTACK' ? 'P1' : 'P2';
          resultMsg.innerHTML = `🎯 進攻破防！${winner === 'P1' ? 'P1' : p2Label} 得分！`;
          triggerShake(); sfx.score(); addScore(winner);
        } else if (result === 'DEF_WIN') {
          let winner = p1Role === 'DEFEND' ? 'P1' : 'P2';
          resultMsg.innerHTML = `💀 防守反擊！${winner === 'P1' ? 'P1' : p2Label} 得分！`;
          triggerShake(); sfx.score(); addScore(winner);
        } else {
          resultMsg.innerHTML = "🔄 揮空僵持！攻擊權轉換"; sfx.clash(); setTimeout(resetRoundUI, 2500);
        }
      }, 1000);
    }

    function getMoveName(role, move) {
      if(role === 'ATTACK') return move==='MOVE1'?'🗡️直劈':(move==='MOVE2'?'💥敲劍':'🎭假招');
      return move==='MOVE1'?'🛡️撥擋':(move==='MOVE2'?'💨滑步':'⚔️劍線');
    }

    function addScore(winner) {
      if (winner === 'P1') p1Score++; else p2Score++;
      document.getElementById('score-p1').innerText = p1Score;
      document.getElementById('score-p2').innerText = p2Score;
      
      if (p1Score >= 5 || p2Score >= 5) {
        gameState = 'GAMEOVER';
        let champion = p1Score >= 5 ? 'P1 (紅方)' : (currentMode === 'SINGLE' ? 'AI 衛冕軍' : 'P2 (藍方)');
        logText.innerHTML = "比賽結束！"; resultMsg.innerHTML = `🏆 ${champion} 獲勝！`;
        
        document.getElementById('start-round-btn').innerText = "再戰一場"; 
        document.getElementById('start-round-btn').style.display = 'block';
        document.getElementById('back-menu-btn').style.display = 'block';
      } else { setTimeout(resetRoundUI, 2500); }
    }
  </script>
</body>
